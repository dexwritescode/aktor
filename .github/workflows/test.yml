name: Test

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            cargo-flags: ""
          - name: serde
            cargo-flags: --features serde
          - name: http
            cargo-flags: --features http
          - name: serde,http
            cargo-flags: --features serde,http
          - name: test-util
            cargo-flags: --features test-util

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache rustup toolchain
        uses: actions/cache@v4
        with:
          path: ~/.rustup/toolchains
          key: rustup-${{ runner.os }}-stable-llvm-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test

      - name: Test
        run: cargo test --locked ${{ matrix.cargo-flags }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --all-features --cobertura --output-path coverage.xml

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: false
          format: markdown
          output: both
        continue-on-error: true